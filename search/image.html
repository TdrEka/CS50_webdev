<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Image Search</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!--Top right navigation link back to Google Search -->
    <nav>
        <a href="index.html">Google Search</a>
    </nav>

    <!-- Main content: logo + search form -->
     <main>
        <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png" alt="Google">
        <form action="https://www.google.com/search">
            <!-- Hidden field that tells google we want image results -->
             <input type="hidden" name="tbm" value="isch">
             <input type="text" name="q" placeholder="Search Google Images...">
             <div class="buttons">
                <input type="submit" value="Google Image Search">
             </div>
        </form>
     </main>
    
</body>
</html>
